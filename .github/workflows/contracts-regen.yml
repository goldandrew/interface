name: Regenerate Contract Bindings

on:
  workflow_dispatch:
    inputs:
      CONTRACT_IDS:
        description: "Space or comma-separated list of contract IDs to regenerate"
        required: true
        type: string

jobs:
  regen:
    name: Regenerate and PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Bindings
        env:
          CONTRACT_IDS: ${{ github.event.inputs.CONTRACT_IDS }}
        run: bun run contracts:gen:all

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate contract bindings"
          branch: chore/regen-contract-bindings
          title: "chore: regenerate contract bindings"
          body: |
            Regenerated contract bindings for the following contract IDs:
            `${{ github.event.inputs.CONTRACT_IDS }}`

            This pull request was automatically generated by the `contracts-regen.yml` workflow.
          labels: |
            automated-pr
            dependencies
